
{% extends 'corte/base.html' %}

{% block body %}
<section class="auth-form-container">
    <h1>Iniciar sesión</h1>
    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-reserva">Ingresar</button>
    </form>
    <p>¿No tenés cuenta? <a href="{% url 'register' %}">Registrarse</a></p>
</section>
{% endblock %}
