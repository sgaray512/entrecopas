{% extends 'vinoteca/base.html' %}

{% block body %}
<section>
    <h1>Iniciar sesión</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Ingresar</button>
    </form>
    <p>¿No tenés cuenta? <a href="{% url 'register' %}">Registrarse</a></p>
</section>
{% endblock %}
