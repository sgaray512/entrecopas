
{% extends 'corte/base.html' %}

{% block body %}
<section class="auth-form-container">
    <h1>Crear cuenta</h1>
    <form method="post" enctype="multipart/form-data" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-reserva">Crear cuenta</button>
    </form>
    <p>¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciar sesión</a></p>
</section>
{% endblock %}
