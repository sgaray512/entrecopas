{% extends 'vinoteca/base.html' %}

{% block body %}
<h1>Bodegas</h1>
{% if perms.vinoteca.add_bodega %}
<a href="{% url 'bodega_create' %}">
    Crear bodega
</a>
{% endif %}
<hr>
{% for bodega in bodegas %}
    <h3>{{ bodega.nombre }}</h3>
    <p>{{ bodega.provincia }}</p>
    {% if perms.vinoteca.view_bodega %}
        <a href="{% url 'bodega_detail' bodega.pk %}">
            Ver detalle
        </a>
    {% endif %}
    <br>
{% endfor %}
{% endblock %}
