{% extends 'vinoteca/base.html' %}

{% block body %}
<h1>Listado de Vinos</h1>
{% if perms.vinoteca.add_vino %}
<a href="{% url 'vino_create' %}">Crear vino</a>
{% endif %}
<hr>
{% for vino in vinos %}
    <h3>{{ vino.nombre }}</h3>
    <p>${{ vino.precio }}</p>
    {% if perms.vinoteca.view_vino %}
        <a href="{% url 'vino_detail' vino.pk %}">Ver detalle</a>
    {% endif %}
    <br>
{% endfor %}
{% endblock %}
